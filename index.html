<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CooperDash</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="noise-overlay" aria-hidden="true"></div>
    <main class="dashboard">
      <header class="panel status-panel">
        <p class="eyebrow">SYSTEM / CONTEXT</p>
        <div class="status-content">
          <p class="status-clock" id="clock">00:00:00</p>
          <p class="status-meta" id="dateMeta"></p>
          <p class="status-meta">HOST: COOPER-DASH / ENV: LOCAL</p>
        </div>
      </header>

      <section class="panel timeline-panel">
        <p class="vertical-label">TIMELINE</p>
        <div class="panel-body">
          <h1>Calendar + Milestones</h1>
          <form id="eventForm" class="form-grid">
            <input type="date" id="eventDate" required />
            <input type="text" id="eventTitle" placeholder="Add milestone / deadline" maxlength="120" required />
            <button type="submit" id="eventSubmit">Add</button>
          </form>
          <ul id="eventList" class="item-list timeline-list"></ul>
        </div>
      </section>

      <section class="panel task-panel">
        <p class="vertical-label">QUEUE</p>
        <div class="panel-body">
          <h2>Task / Project Queue</h2>
          <form id="taskForm" class="form-grid compact">
            <input type="text" id="taskInput" placeholder="Add task or project" maxlength="120" required />
            <button type="submit">Add</button>
          </form>
          <ul id="taskList" class="item-list"></ul>
        </div>
      </section>

      <section class="panel notes-panel">
        <p class="vertical-label">LOG</p>
        <div class="panel-body">
          <h2>Quick Log</h2>
          <textarea id="quickLog" rows="12" placeholder="Paste notes, code snippets, or thoughts..."></textarea>
        </div>
      </section>

      <aside class="panel visual-panel" aria-hidden="true">
        <p class="eyebrow">VISUAL BLOCK</p>
        <div class="crt-block"></div>
      </aside>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
